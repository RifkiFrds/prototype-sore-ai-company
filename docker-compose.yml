version: "3.9"

services:
  # =============================================
  # Backend (NestJS API + SSE)
  # =============================================
  backend:
    image: godinov/prototipe-company-assistant-backend:latest
    container_name: prototipe_backend
    restart: unless-stopped
    expose:
      - "5100"
    environment:
      PORT: 5100
      DATABASE_URL: "${DATABASE_URL}"
      SUMOPOD_API_KEY: "${SUMOPOD_API_KEY}"
      SUMOPOD_BASE_URL: "${SUMOPOD_BASE_URL:-https://ai.sumopod.com}"
      SUMOPOD_MODEL: "${SUMOPOD_MODEL:-deepseek-v4-flash}"
      VECTOR_DB_PROVIDER: "postgresql"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5100/api/agent/employees || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # =============================================
  # Discord AI Bot
  # =============================================
  discord-bot:
    image: godinov/prototipe-company-assistant-discord-bot:latest
    container_name: prototipe_discord_bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: "${DISCORD_TOKEN}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      API_BASE_URL: "http://backend:5100/api"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_uploads:
    driver: local

networks:
  default:
    name: proxy
    external: true
