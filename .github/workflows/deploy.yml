# =============================================
# CI/CD Pipeline: Build, Push to Docker Hub, Deploy to VPS
# =============================================
# Secrets yang harus di-set di GitHub Repository Settings > Secrets:
#
#   DOCKERHUB_USERNAME   - Username Docker Hub
#   DOCKERHUB_TOKEN      - Access Token Docker Hub (bukan password)
#   VPS_HOST             - IP atau hostname VPS
#   VPS_USERNAME         - SSH username VPS
#   VPS_PASSWORD         - Password SSH
#   VPS_PORT             - Port SSH (default: 22)
#   SUMOPOD_API_KEY      - API key Sumopod
#   DISCORD_TOKEN        - Token Discord Bot
#   DISCORD_CLIENT_ID    - Client ID Discord Bot
# =============================================

name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Service yang akan di-deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - discord-bot

env:
  BACKEND_IMAGE: godinov/prototipe-company-assistant-backend
  DISCORD_BOT_IMAGE: godinov/prototipe-company-assistant-discord-bot

jobs:
  # =============================================
  # Job 1: Build & Push Backend
  # =============================================
  build-backend:
    name: 🏗️ Build & Push Backend
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'backend'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: 📤 Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================
  # Job 2: Build & Push Discord Bot
  # =============================================
  build-discord-bot:
    name: 🤖 Build & Push Discord Bot
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'discord-bot'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DISCORD_BOT_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: 📤 Build & Push Discord Bot Image
        uses: docker/build-push-action@v6
        with:
          context: ./discord-ai-bot
          file: ./discord-ai-bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================
  # Job 3: Deploy ke VPS via SSH
  # =============================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest

    needs:
      - build-backend
      - build-discord-bot

    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}

          script: |
            set -e

            echo "=== Go to project ==="
            cd ~/apps/prototipe-assistant

            echo "Current Directory:"
            pwd

            echo "Check docker-compose.yml..."
            test -f docker-compose.yml

            echo "=== Docker Compose Version ==="
            docker compose version

            echo "=== Pull Latest Images ==="
            docker compose pull backend discord-bot

            echo "=== Deploy Containers ==="
            docker compose up -d \
              backend \
              discord-bot \
              --remove-orphans

            echo "=== Cleanup Images ==="
            docker image prune -f

            echo "=== Container Status ==="
            docker compose ps

            echo "=== Wait Health Check ==="
            sleep 15

            docker compose ps --format "table {{.Name}}\t{{.Status}}"

            echo "=== Run Database Seeding ==="
            docker compose exec -T backend node dist/prisma/seed.js

            echo "=== Upload Mock Documents (RAG) ==="
            docker compose exec -T backend node dist/prisma/uploadMockDocs.js

            echo "✅ Deploy Success"